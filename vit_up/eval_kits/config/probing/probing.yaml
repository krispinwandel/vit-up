# @package _global_

defaults:
  - schedule/mode: eval
  - schedule/dataset: voc
  - workstation: local

  - dataset_evaluation: voc

  - /model@model: dinov3/base/backbone
  - backbone: base
  - optimizer: adamw
  - logger: wandb
  - loss: base

  - dataset@train_dataset: train
  - dataset@val_dataset: val
  - dataloader@train_dataloader: train
  - dataloader@val_dataloader: val

  - _self_

mode: ${hydra:runtime.choices.schedule/mode}
dataset: ${hydra:runtime.choices.schedule/dataset}

# Select which probing pipeline to run.
# - eval: frozen-head eval
# - train: train probing head
# - finetune: finetune probing head
model_ckpt: null
task: seg

# General parameters
epochs: 1
max_steps: 100_000

bfloat16: True
ratio: random
seed: 42

# Shared mode-level settings (migrated from mode_common.yaml)
# These values are applied on every run via defaults ordering.
num_epochs: ${schedule.num_epochs}

optimizer:
  lr: ${schedule.lr}

train_dataloader:
  batch_size: 4

val_dataloader:
  batch_size: 1

img_size: 448
target_size: ${img_size}

metrics:
  seg:
    num_classes: ${dataset_evaluation.num_classes}
  depth:
    min_depth: 1e-3
    max_depth: 10

sanity: false

hydra:
  searchpath:
    - file://${oc.env:PWD}/vit_up/eval_kits/config
